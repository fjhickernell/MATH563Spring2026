format:
  revealjs:
    navigation-mode: grid
    controls: true
    reveal-options:
      disableLayout: true

    html-math-method:
      method: mathjax
      url: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js

    include-in-header:
      - ../classlib/classlib/quarto/slides/hickernell-latex-macros.js

    include-after-body:
      - ../classlib/classlib/quarto/slides/reveal-scale-var.html
      - ../classlib/classlib/quarto/slides/reveal-nav-reset.html

    preview-links: auto
    incremental: false
    transition: none
    background-transition: none

    title-slide-attributes:
      data-background-image: https://fjhickernell.github.io/SIAMUQ26/classlib/classlib/quarto/assets/images/campus/IllinoisTech_MiesCampus.jpg
      data-background-size: cover
      data-background-position: center center

    theme:
      - simple
      - ../classlib/classlib/quarto/slides/hickernell-slides.scss
      - ../classlib/classlib/quarto/slides/research/research-slides.scss

    slide-number: c/t
    show-slide-number: all
    width: 1600
    height: 1000
    margin: 0.00
    center: false
    slide-level: 2

